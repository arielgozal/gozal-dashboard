name: Update dashboard data

on:
  schedule:
    - cron: '17 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual "Run workflow" button

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Collect metrics
        run: python scrape.py

      - name: Commit and push
        run: |
          git config user.name "gozal-bot"
          git config user.email "bot@gozalapp.com"
          git add data/metrics.json data/history.json
          git diff --cached --quiet || git commit -m "data: refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
