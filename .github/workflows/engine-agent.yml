name: Daily engine agent

on:
  schedule:
    - cron: '0 11 * * *'   # daily, morning US Eastern
  workflow_dispatch:

permissions:
  contents: read

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is not set. Run 'claude setup-token' locally and add it as a repo secret."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run daily agent
        run: claude -p "$(cat agent/DAILY.md)" --dangerously-skip-permissions
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ENGINE_TEAM_KEY: ${{ secrets.ENGINE_TEAM_KEY }}
